name: Release

on:
  push:
    branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node@v4 with registry-url creates a project .npmrc containing
          # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` which is only
          # resolved at command-run time — so NODE_AUTH_TOKEN must be set here,
          # not just on setup-node. Without it, npm publish sees an empty token
          # and fails with a misleading 404 (masked 401).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
